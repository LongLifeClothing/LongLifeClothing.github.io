<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Long Life Clothing</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="cart.js"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <h1>Long Life Clothing</h1>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li class="cart-icon"><a href="cart.html">🛒</a></li>
        </ul>
    </nav>

    <!-- Checkout Form -->
    <section class="checkout-page">
        <h2>Checkout</h2>
        <form>
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="address">Shipping Address:</label><br>
            <textarea id="address" name="address" rows="4" required></textarea><br><br>

            <label for="card">Card Information:</label>
            <input type="text" id="card" name="card" placeholder="1234 5678 9012 3456" required><br><br>

            <label for="expiry">Expiry Date:</label>
            <input type="text" id="expiry" name="expiry" placeholder="MM/YY" required><br><br>

            <label for="cvv">CVV:</label>
            <input type="text" id="cvv" name="cvv" placeholder="123" required><br><br>

            <button type="submit">Complete Purchase</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 Long Life Clothing. All rights reserved.</p>
    </footer>
</body>
</html
